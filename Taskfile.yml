version: "3"

vars:
  BOOTSTRAP_DIR: bootstrap
  NAMESPACE_ADMIN_DIR: namespace-admin
  NAMESPACE_TN001_DIR: namespace-tn001
  ACT_ARCH: linux/amd64

tasks:
  # ---------------------------------------------------------------------------
  # Top-level tasks
  # ---------------------------------------------------------------------------

  lint:
    desc: Run all code quality and formatting checks
    cmd: pre-commit run -a

  deps:
    desc: Check required dependencies are installed
    cmds:
      - command -v terraform >/dev/null 2>&1 || (echo "terraform not found" && exit 1)
      - command -v vault >/dev/null 2>&1 || (echo "vault not found" && exit 1)
      - command -v hcp >/dev/null 2>&1 || (echo "hcp not found" && exit 1)
      - command -v pre-commit >/dev/null 2>&1 || (echo "pre-commit not found" && exit 1)
      - command -v act >/dev/null 2>&1 || (echo "act not found - see https://github.com/nektos/act" && exit 1)
      - echo "All dependencies satisfied"

  test:ci:
    desc: Validate the GitHub Actions workflows locally with act (validate + dry-run, no execution)
    cmds:
      - 'command -v act >/dev/null 2>&1 || (echo "act not found - see https://github.com/nektos/act" && exit 1)'
      - act --validate
      - 'act pull_request --dryrun --container-architecture {{.ACT_ARCH}} -W .github/workflows/namespace-admin.yml'
      - 'act pull_request --dryrun --container-architecture {{.ACT_ARCH}} -W .github/workflows/namespace-tn001.yml'

  # ---------------------------------------------------------------------------
  # bootstrap namespace
  # ---------------------------------------------------------------------------

  bootstrap:init:
    desc: Initialise Terraform providers and modules for the bootstrap module
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform init -upgrade

  bootstrap:lock:
    desc: Generate provider lock for multiple platforms
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform providers lock -platform=linux_amd64 -platform=darwin_arm64 -platform=darwin_amd64

  bootstrap:validate:
    desc: Validate the bootstrap Terraform configuration
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform validate

  bootstrap:fmt:
    desc: Format the bootstrap Terraform files
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform fmt -recursive

  bootstrap:plan:
    desc: Generate and display a Terraform execution plan for bootstrap
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform plan

  bootstrap:apply:
    desc: Apply the bootstrap infrastructure (prompts for confirmation). Pass -- -auto-approve to skip prompt.
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform apply {{.CLI_ARGS}}

  bootstrap:apply:hcp:
    desc: "First-time only: apply just the HCP cluster + random resources"
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform apply -target=random_pet.default -target=hcp_hvn.vault_hvn -target=hcp_vault_cluster.vault_cluster -target=hcp_vault_cluster_admin_token.admin_token {{.CLI_ARGS}}

  bootstrap:apply:vault:
    desc: "First-time only: apply the Vault child namespaces"
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform apply -target=vault_namespace.namespaces {{.CLI_ARGS}}

  bootstrap:destroy:
    desc: Destroy all bootstrap-managed infrastructure (prompts for confirmation)
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform destroy

  bootstrap:output:
    desc: Display all outputs from the bootstrap state
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output

  bootstrap:env:
    desc: Print eval command to set VAULT_ADDR and VAULT_TOKEN
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_env_exports

  bootstrap:tfe-token:
    desc: Print the HCP Terraform team token (set as the TFE_TOKEN GitHub secret)
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw tfe_team_token

  bootstrap:vault-token:
    desc: Copy the Vault cluster admin token to the clipboard
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_admin_token | pbcopy

  vault:ui:
    desc: Open the Vault UI in the browser
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - open "$(terraform output -raw vault_public_endpoint_url)"

  bootstrap:vault-addr:
    desc: Print the Vault public endpoint URL (set as the VAULT_ADDR GitHub variable)
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_public_endpoint_url

  bootstrap:gh-config:
    desc: Set the VAULT_ADDR variable and TFE_TOKEN secret on the GitHub repo
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_public_endpoint_url | gh variable set VAULT_ADDR
      - terraform output -raw tfe_team_token | gh secret set TFE_TOKEN

  bootstrap:clean:
    desc: Remove local Terraform cache for bootstrap
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - rm -rf .terraform .terraform.lock.hcl

  # ---------------------------------------------------------------------------
  # namespace-admin namespace
  # ---------------------------------------------------------------------------

  namespace-admin:init:
    desc: Initialise Terraform providers and modules for the namespace-admin module
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform init -upgrade

  namespace-admin:lock:
    desc: Generate provider lock for multiple platforms
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform providers lock -platform=linux_amd64 -platform=darwin_arm64 -platform=darwin_amd64

  namespace-admin:validate:
    desc: Validate the namespace-admin Terraform configuration
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform validate

  namespace-admin:fmt:
    desc: Format the namespace-admin Terraform files
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform fmt -recursive

  namespace-admin:plan:
    desc: Generate and display a Terraform execution plan for namespace-admin
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform plan

  namespace-admin:apply:
    desc: Apply the namespace-admin infrastructure (prompts for confirmation). Pass -- -auto-approve to skip prompt.
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform apply {{.CLI_ARGS}}

  namespace-admin:destroy:
    desc: Destroy all namespace-admin-managed infrastructure (prompts for confirmation)
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform destroy

  namespace-admin:output:
    desc: Display all outputs from the namespace-admin state
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform output

  namespace-admin:env:
    desc: Print eval command to set TF_VAR_vault_addr and TF_VAR_vault_token from VAULT_ADDR/VAULT_TOKEN
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    silent: true
    cmds:
      - echo "export TF_VAR_vault_addr=$VAULT_ADDR"
      - echo "export TF_VAR_vault_token=$VAULT_TOKEN"

  namespace-admin:clean:
    desc: Remove local Terraform cache for namespace-admin
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - rm -rf .terraform .terraform.lock.hcl

  # ---------------------------------------------------------------------------
  # namespace-tn001 namespace
  # ---------------------------------------------------------------------------

  namespace-tn001:init:
    desc: Initialise Terraform providers and modules for namespace-tn001
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform init -upgrade

  namespace-tn001:lock:
    desc: Generate provider lock for multiple platforms
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform providers lock -platform=linux_amd64 -platform=darwin_arm64 -platform=darwin_amd64

  namespace-tn001:validate:
    desc: Validate the namespace-tn001 Terraform configuration
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform validate

  namespace-tn001:fmt:
    desc: Format namespace-tn001 Terraform files
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform fmt -recursive

  namespace-tn001:plan:
    desc: Generate and display a Terraform execution plan for namespace-tn001
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform plan

  namespace-tn001:apply:
    desc: Apply the namespace-tn001 infrastructure. Pass -- -auto-approve to skip prompt.
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform apply {{.CLI_ARGS}}

  namespace-tn001:destroy:
    desc: Destroy all namespace-tn001-managed infrastructure
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform destroy

  namespace-tn001:output:
    desc: Display all outputs from the namespace-tn001 state
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform output

  namespace-tn001:clean:
    desc: Remove local Terraform cache for namespace-tn001
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - rm -rf .terraform .terraform.lock.hcl

  # ---------------------------------------------------------------------------
  # PKI offline-root CA tasks (namespace-tn001)
  # ---------------------------------------------------------------------------

  pki:root:generate:
    desc: Generate a self-signed root CA key and certificate using OpenSSL
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - mkdir -p .pki
      - |
        openssl req -newkey rsa:4096 -aes256 \
          -keyout .pki/root-ca.key \
          -x509 -days 730 \
          -out .pki/root-ca.crt \
          -subj "/CN=tn001 Root CA/O=nhsy-hcp-org/OU=tn001"
      - echo "Root CA generated at namespace-tn001/.pki/root-ca.{key,crt}"

  pki:root:view:
    desc: Display the root CA certificate details
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - openssl x509 -in .pki/root-ca.crt -noout -text

  pki:int:csr:
    desc: Retrieve the intermediate CA CSR (generated by Terraform) and write to .pki/intermediate.csr
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - mkdir -p .pki
      - terraform output -raw pki_intermediate_csr > .pki/intermediate.csr
      - echo "CSR written to namespace-tn001/.pki/intermediate.csr"

  pki:int:sign:
    desc: Sign the intermediate CSR with the offline root CA
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - |
        openssl x509 -req \
          -days 365 \
          -in .pki/intermediate.csr \
          -CA .pki/root-ca.crt \
          -CAkey .pki/root-ca.key \
          -CAcreateserial \
          -out .pki/intermediate-signed.crt \
          -extensions v3_ca \
          -extfile <(printf "[v3_ca]\nbasicConstraints=critical,CA:TRUE,pathlen:0\nkeyUsage=critical,keyCertSign,cRLSign\nsubjectKeyIdentifier=hash\nauthorityKeyIdentifier=keyid:always,issuer")
      - echo "Signed certificate written to namespace-tn001/.pki/intermediate-signed.crt"

  pki:int:verify:
    desc: Verify the intermediate certificate chain against the root CA
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - openssl verify -CAfile .pki/root-ca.crt .pki/intermediate-signed.crt

  pki:int:import:
    desc: Import the signed intermediate certificate into Vault
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - |
        vault write \
          -namespace=admin/tn001 \
          pki-int/intermediate/set-signed \
          certificate=@.pki/intermediate-signed.crt
      - echo "Intermediate certificate imported into Vault"
