version: "3"

vars:
  BOOTSTRAP_DIR: bootstrap
  NAMESPACE_ADMIN_DIR: namespace-admin
  NAMESPACE_TN001_DIR: namespace-tn001
  ACT_ARCH: linux/amd64

tasks:
  # ---------------------------------------------------------------------------
  # Top-level tasks
  # ---------------------------------------------------------------------------

  lint:
    desc: Run all code quality and formatting checks (includes terraform-docs and markdown lint)
    cmds:
      - task: terraform-docs
      - pre-commit run -a

  terraform-docs:
    desc: Generate terraform-docs README.md for all modules under modules/
    cmds:
      - |
        for mod in modules/*/; do
          terraform-docs --config .terraform-docs.yml "$mod"
        done

  markdown-lint:
    desc: Lint all Markdown files (excludes .plans/ and .tmp/)
    cmds:
      - npx markdownlint-cli --config .markdownlint.yml --ignore '.plans/' --ignore '.tmp/' '**/*.md'

  deps:
    desc: Check required dependencies are installed
    cmds:
      - command -v terraform >/dev/null 2>&1 || (echo "terraform not found" && exit 1)
      - command -v vault >/dev/null 2>&1 || (echo "vault not found" && exit 1)
      - command -v hcp >/dev/null 2>&1 || (echo "hcp not found" && exit 1)
      - command -v pre-commit >/dev/null 2>&1 || (echo "pre-commit not found" && exit 1)
      - command -v act >/dev/null 2>&1 || (echo "act not found - see https://github.com/nektos/act" && exit 1)
      - echo "All dependencies satisfied"

  test:ci:
    desc: Validate and run all GitHub Actions workflows locally with act
    cmds:
      - 'command -v act >/dev/null 2>&1 || (echo "act not found - see https://github.com/nektos/act" && exit 1)'
      - act --validate
      - 'act -j pre-commit --container-architecture {{.ACT_ARCH}} -W .github/workflows/lint.yml'
      - 'act pull_request --dryrun --container-architecture {{.ACT_ARCH}} -W .github/workflows/namespace-admin.yml'
      - 'act pull_request --dryrun --container-architecture {{.ACT_ARCH}} -W .github/workflows/namespace-tn001.yml'
      - 'act -j lint --container-architecture {{.ACT_ARCH}} -W .github/workflows/namespace-admin.yml'
      - 'act -j lint --container-architecture {{.ACT_ARCH}} -W .github/workflows/namespace-tn001.yml'

  test:lint:
    desc: Run the lint GitHub Actions workflow locally with act
    cmds:
      - 'command -v act >/dev/null 2>&1 || (echo "act not found - see https://github.com/nektos/act" && exit 1)'
      - 'act -j pre-commit --container-architecture {{.ACT_ARCH}} -W .github/workflows/lint.yml'

  # ---------------------------------------------------------------------------
  # bootstrap namespace
  # ---------------------------------------------------------------------------

  bootstrap:workspace:create:
    desc: "Pre-init: create the bootstrap HCP Terraform workspace via REST API (chicken-and-egg)"
    cmds:
      - scripts/bootstrap-workspace-create.sh

  bootstrap:init:
    desc: Initialise Terraform providers and modules for the bootstrap module
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform init -upgrade

  bootstrap:lock:
    desc: Generate provider lock for multiple platforms
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform providers lock -platform=linux_amd64 -platform=darwin_arm64 -platform=darwin_amd64

  bootstrap:validate:
    desc: Validate the bootstrap Terraform configuration
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform validate

  bootstrap:fmt:
    desc: Format the bootstrap Terraform files
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform fmt -recursive

  bootstrap:plan:
    desc: Generate and display a Terraform execution plan for bootstrap
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform plan

  bootstrap:apply:
    desc: Apply the bootstrap infrastructure (prompts for confirmation). Pass -- -auto-approve to skip prompt.
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform apply {{.CLI_ARGS}}

  bootstrap:apply:hcp:
    desc: "First-time only: apply just the HCP cluster + random resources"
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform apply -target=random_pet.default -target=hcp_hvn.vault_hvn -target=hcp_vault_cluster.vault_cluster -target=hcp_vault_cluster_admin_token.admin_token {{.CLI_ARGS}}

  bootstrap:apply:vault:
    desc: "First-time only: apply the Vault child namespaces"
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform apply -target=vault_namespace.namespaces {{.CLI_ARGS}}

  bootstrap:destroy:
    desc: Destroy all bootstrap-managed infrastructure (prompts for confirmation)
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform destroy

  bootstrap:output:
    desc: Display all outputs from the bootstrap state
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output

  bootstrap:env:
    desc: Print eval command to set VAULT_ADDR and VAULT_TOKEN
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_env_exports

  bootstrap:tfe-token:
    desc: Print the HCP Terraform team token (set as the TFE_TOKEN GitHub secret)
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw tfe_team_token

  bootstrap:vault-token:
    desc: Copy the Vault cluster admin token to the clipboard
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_admin_token | pbcopy

  vault:ui:
    desc: Open the Vault UI in the browser
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - open "$(terraform output -raw vault_public_endpoint_url)"

  bootstrap:vault-addr:
    desc: Print the Vault public endpoint URL (set as the VAULT_ADDR GitHub variable)
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_public_endpoint_url

  bootstrap:gh-config:
    desc: Set the VAULT_ADDR variable and TFE_TOKEN secret on the GitHub repo
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - terraform output -raw vault_public_endpoint_url | gh variable set VAULT_ADDR
      - terraform output -raw tfe_team_token | gh secret set TFE_TOKEN

  bootstrap:clean:
    desc: Remove local Terraform cache for bootstrap
    dir: "{{.BOOTSTRAP_DIR}}"
    cmds:
      - rm -rf .terraform .terraform.lock.hcl

  # ---------------------------------------------------------------------------
  # namespace-admin namespace
  # ---------------------------------------------------------------------------

  namespace-admin:init:
    desc: Initialise Terraform providers and modules for the namespace-admin module
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform init -upgrade

  namespace-admin:validate:
    desc: Validate the namespace-admin Terraform configuration
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform validate

  namespace-admin:fmt:
    desc: Format the namespace-admin Terraform files
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform fmt -recursive

  namespace-admin:plan:
    desc: Generate and display a Terraform execution plan for namespace-admin
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - |
        eval "$(task bootstrap:env)"
        terraform plan

  namespace-admin:destroy:
    desc: Destroy all namespace-admin-managed infrastructure (prompts for confirmation)
    dir: "{{.NAMESPACE_ADMIN_DIR}}"
    cmds:
      - terraform destroy

  namespace-tn001:init:
    desc: Initialise Terraform providers and modules for namespace-tn001
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform init -upgrade

  namespace-tn001:validate:
    desc: Validate the namespace-tn001 Terraform configuration
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform validate

  namespace-tn001:fmt:
    desc: Format namespace-tn001 Terraform files
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform fmt -recursive

  namespace-tn001:plan:
    desc: Generate and display a Terraform execution plan for namespace-tn001
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - |
        eval "$(task bootstrap:env)"
        terraform plan

  namespace-tn001:destroy:
    desc: Destroy all namespace-tn001-managed infrastructure
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - terraform destroy

  # ---------------------------------------------------------------------------
  # PKI offline-root CA tasks (namespace-tn001)
  # ---------------------------------------------------------------------------

  pki:root:generate:
    desc: Generate a self-signed root CA key and certificate using OpenSSL
    cmds:
      - mkdir -p .tmp/pki
      - |
        openssl req -newkey rsa:4096 \
          -keyout .tmp/pki/root-ca.key \
          -x509 -days 730 \
          -out .tmp/pki/root-ca.crt \
          -noenc \
          -subj "/CN=tn001 Root CA/O=nhsy-hcp-org/OU=tn001"
      - echo "Root CA generated at .tmp/pki/root-ca.{key,crt}"

  pki:root:view:
    desc: Display the root CA certificate details
    cmds:
      - openssl x509 -in .tmp/pki/root-ca.crt -noout -text

  pki:int:csr:
    desc: Retrieve the intermediate CA CSR (generated by Terraform) and write to .tmp/pki/intermediate.csr
    dir: "{{.NAMESPACE_TN001_DIR}}"
    cmds:
      - mkdir -p ../.tmp/pki
      - terraform output -raw pki_intermediate_csr > ../.tmp/pki/intermediate.csr
      - echo "CSR written to .tmp/pki/intermediate.csr"

  pki:int:sign:
    desc: Sign the intermediate CSR with the offline root CA
    cmds:
      - scripts/pki-int-sign.sh

  pki:int:verify:
    desc: Verify the intermediate certificate chain against the root CA
    cmds:
      - openssl verify -CAfile .tmp/pki/root-ca.crt .tmp/pki/intermediate-signed.crt

  pki:int:import:
    desc: Import the signed intermediate certificate into Vault and build the CA chain bundle
    cmds:
      - |
        vault write \
          -namespace=admin/tn001 \
          pki-int/intermediate/set-signed \
          certificate=@.tmp/pki/intermediate-signed.crt || true
      - echo "Intermediate certificate imported into Vault"
      - task: pki:int:set-issuer
      - task: pki:int:chain

  pki:int:set-issuer:
    desc: Set the imported intermediate issuer as the default and link it to the Terraform-managed key
    cmds:
      - scripts/pki-int-set-issuer.sh

  pki:int:regen:
    desc: Taint the intermediate cert request, re-apply, re-sign, import, and set the default issuer
    cmds:
      - |
        eval "$(task bootstrap:env)"
        terraform -chdir={{.NAMESPACE_TN001_DIR}} taint \
          module.pki_intermediate.vault_pki_secret_backend_intermediate_cert_request.default
      - |
        eval "$(task bootstrap:env)"
        terraform -chdir={{.NAMESPACE_TN001_DIR}} apply -auto-approve \
          -target=module.pki_intermediate.vault_pki_secret_backend_intermediate_cert_request.default
      - task: pki:int:csr
      - task: pki:int:sign
      - task: pki:int:verify
      - task: pki:int:import

  pki:int:chain:
    desc: Fetch the intermediate CA cert from Vault and build .tmp/pki/ca-chain.pem (root + intermediate)
    cmds:
      - mkdir -p .tmp/pki
      - |
        VAULT_ADDR="$VAULT_ADDR" VAULT_TOKEN="$VAULT_TOKEN" \
        vault read -namespace=admin/tn001 -format=json pki-int/cert/ca \
          | jq -r '.data.certificate' > .tmp/pki/intermediate-ca.pem
      - cat .tmp/pki/root-ca.crt .tmp/pki/intermediate-ca.pem > .tmp/pki/ca-chain.pem
      - echo "CA chain written to .tmp/pki/ca-chain.pem"

  pki:int:cert:
    desc: Fetch the intermediate CA cert from Vault and display with openssl x509
    cmds:
      - mkdir -p .tmp/pki
      - |
        eval "$(task bootstrap:env)"
        vault read -namespace=admin/tn001 -format=json pki-int/cert/ca \
          | jq -r '.data.certificate' | tee .tmp/pki/intermediate-ca.pem \
          | openssl x509 -noout -text

  pki:test:issue:
    desc: Test the PKI issue endpoint — Vault generates key and certificate for the server role
    vars:
      ROLE: '{{.ROLE | default "server"}}'
      CN: '{{.CN | default "helloworld.example.com"}}'
      TTL: '{{.TTL | default "1h"}}'
    env:
      ROLE: "{{.ROLE}}"
      CN: "{{.CN}}"
      TTL: "{{.TTL}}"
    cmds:
      - VAULT_ADDR="$VAULT_ADDR" VAULT_TOKEN="$VAULT_TOKEN" scripts/pki-test-issue.sh

  pki:test:issue:inspect:
    desc: Issue a certificate and inspect AIA, CRL, and OCSP extensions with openssl
    vars:
      ROLE: '{{.ROLE | default "server"}}'
      CN: '{{.CN | default "helloworld.example.com"}}'
      TTL: '{{.TTL | default "1h"}}'
    cmds:
      - |
        eval "$(task bootstrap:env)"
        vault write -namespace=admin/tn001 -format=json pki-int/issue/{{.ROLE}} \
          common_name={{.CN}} ttl={{.TTL}} \
          | jq -r '.data.certificate' \
          | openssl x509 -noout -text \
          | grep -A5 "Authority Information\|CRL Distribution"

  pki:test:sign:
    desc: Test the PKI sign endpoint — generate a local CSR and have Vault sign it for the server role
    vars:
      ROLE: '{{.ROLE | default "server"}}'
      CN: '{{.CN | default "helloworld.example.com"}}'
      TTL: '{{.TTL | default "1h"}}'
    env:
      ROLE: "{{.ROLE}}"
      CN: "{{.CN}}"
      TTL: "{{.TTL}}"
    cmds:
      - VAULT_ADDR="$VAULT_ADDR" VAULT_TOKEN="$VAULT_TOKEN" scripts/pki-test-sign.sh

  pki:test:
    desc: Run both PKI issue and sign endpoint tests
    cmds:
      - task: pki:test:issue
      - task: pki:test:sign

  pki:read:
    desc: Read pki-int configuration (urls, crl, cluster, issuers, roles)
    cmds:
      - |
        eval "$(task bootstrap:env)"
        vault read -namespace=admin/tn001 pki-int/config/urls
        vault read -namespace=admin/tn001 pki-int/config/crl
        vault read -namespace=admin/tn001 pki-int/config/cluster
        vault list -namespace=admin/tn001 pki-int/issuers
        vault list -namespace=admin/tn001 pki-int/roles

  pki:int:crl:
    desc: Fetch the CRL from Vault and display with openssl crl
    cmds:
      - |
        eval "$(task bootstrap:env)"
        vault read -namespace=admin/tn001 -format=json pki-int/cert/crl \
          | jq -r '.data.certificate' \
          | openssl crl -noout -text -inform PEM
