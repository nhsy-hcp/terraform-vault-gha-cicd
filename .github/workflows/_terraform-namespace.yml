name: terraform-namespace

on:
  workflow_call:
    inputs:
      namespace:
        description: Terraform namespace folder
        required: true
        type: string
      vault_role:
        description: Vault JWT auth role
        required: true
        type: string
      vault_namespace:
        description: Vault namespace to authenticate against
        required: false
        type: string
        default: admin

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: "terraform (${{ inputs.namespace }})"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ inputs.namespace }}
    env:
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TFE_TOKEN }}

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          exportToken: true
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          namespace: ${{ inputs.vault_namespace }}
          path: jwt_github
          role: ${{ inputs.vault_role }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -detailed-exitcode 2>&1 | tee plan.log; exit ${PIPESTATUS[0]}

      - name: Terraform force-unlock (plan)
        if: failure() && steps.plan.outcome == 'failure'
        run: |
          lock_id=$(grep -oE 'ID:[[:space:]]+[0-9a-f-]{36}' plan.log | head -n1 | awk '{print $2}')
          if [ -n "$lock_id" ]; then
            echo "Releasing Terraform state lock $lock_id"
            terraform force-unlock -force "$lock_id"
          else
            echo "No Terraform state lock detected; nothing to unlock"
          fi

      - name: Terraform apply
        id: apply
        if: github.ref == 'refs/heads/main' && steps.plan.outcome == 'success' && steps.plan.outputs.exitcode == '2'
        run: terraform apply -auto-approve 2>&1 | tee apply.log; exit ${PIPESTATUS[0]}

      - name: Terraform force-unlock (apply)
        if: failure() && steps.apply.outcome == 'failure'
        run: |
          lock_id=$(grep -oE 'ID:[[:space:]]+[0-9a-f-]{36}' apply.log | head -n1 | awk '{print $2}')
          if [ -n "$lock_id" ]; then
            echo "Releasing Terraform state lock $lock_id"
            terraform force-unlock -force "$lock_id"
          else
            echo "No Terraform state lock detected; nothing to unlock"
          fi

      - name: Revoke Vault token
        if: always()
        run: |
          curl -s --fail \
            --header "X-Vault-Token: $VAULT_TOKEN" \
            --header "X-Vault-Namespace: ${{ inputs.vault_namespace }}" \
            --request POST \
            "${VAULT_ADDR}/v1/auth/token/revoke-self"
