name: terraform-namespace

on:
  workflow_call:
    inputs:
      namespace:
        description: Terraform namespace folder
        required: true
        type: string
      vault_role:
        description: Vault JWT auth role
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ inputs.namespace }}
    env:
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
      TF_VAR_vault_addr: ${{ vars.VAULT_ADDR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to Vault
        uses: hashicorp/vault-action@v3
        with:
          exportToken: true
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          namespace: admin
          path: jwt_github
          role: ${{ inputs.vault_role }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve

      - name: Revoke Vault token
        if: always()
        run: |
          curl -s --fail \
            --header "X-Vault-Token: ${{ env.VAULT_TOKEN }}" \
            --header "X-Vault-Namespace: admin" \
            --request POST \
            "${VAULT_ADDR}/v1/auth/token/revoke-self"
